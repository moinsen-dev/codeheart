name: 💝 Community Feedback
description: Share feedback as a community member, social worker, or beneficiary
title: "[FEEDBACK]: "
labels: ["feedback", "community"]
assignees:
  - community-team

body:
  - type: dropdown
    id: role
    attributes:
      label: Your Role
      description: How are you connected to CodeHeart?
      options:
        - Beneficiary
        - Social Worker
        - Partner Organization
        - Volunteer
        - Donor
        - General Community Member
    validations:
      required: true

  - type: textarea
    id: feedback
    attributes:
      label: Your Feedback
      description: Please share your thoughts, experiences, or suggestions
      placeholder: |
        Tell us what's on your mind...
        - What works well?
        - What could be improved?
        - Any concerns?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feedback Area
      description: What aspect of CodeHeart is this about?
      multiple: true
      options:
        - User Experience
        - Privacy & Security
        - Accessibility
        - Language Support
        - Payment Process
        - Communication
        - Other
    validations:
      required: true

  - type: checkboxes
    id: consent
    attributes:
      label: Consent
      options:
        - label: I consent to this feedback being used to improve CodeHeart
          required: true